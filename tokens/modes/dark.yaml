# ── VSCode-specific workbench colors ────────
vscode:
  activity_bar_bg: "#2d3b43"
  activity_bar_active_bg: "#354550"
  activity_bar_border: "#ffffff10"
  sidebar_bg:     "#2d3b43"
  minimap_bg:     "#2f3f4a"
  peek_editor_bg: "#2f3f4a"
  peek_result_bg: "#2d3b43"
  tab_border:     "#2d3b43"
  terminal_bg:    "#354550"
  remote_bg:      "#2d3b43"
  status_bar_bg:  "#2d3b43"
  breadcrumb_bg:  "#354550"
  editor_widget_bg: "#29343b"
  button_bg:      "#ffd700"
  button_fg:      "#000000"
  input_bg:       "#384a56"
