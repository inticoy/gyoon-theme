# vscode.yaml — semantic tokens → VSCode color-theme.json keys

colors:
  # Editor
  "editor.background":                    ui.bg_editor
  "editor.foreground":                    syntax.text
  "editor.lineHighlightBackground":       ui.bg_tab_active
  "editor.selectionBackground":           ui.selection_bg
  "editorCursor.foreground":              ui.caret
  "editorLineNumber.foreground":          ui.line_numbers
  "editorLineNumber.activeForeground":    ui.line_number_active
  "editorIndentGuide.background":         ui.indent_guide
  "editorIndentGuide.activeBackground":   ui.indent_guide_active
  "editorWhitespace.foreground":          ui.whitespace
  "editorGutter.background":              ui.bg_gutter
  "editorWidget.background":              vscode.editor_widget_bg

  # Editor groups / tabs
  "editorGroupHeader.tabsBackground":     ui.bg
  "editorGroupHeader.noTabsBackground":   ui.bg
  "tab.activeBackground":                 ui.bg_tab_active
  "tab.inactiveBackground":               ui.bg
  "tab.border":                           vscode.tab_border

  # Sidebar
  "sideBar.background":                   vscode.sidebar_bg

  # Activity bar
  "activityBar.background":               vscode.activity_bar_bg
  "activityBar.activeBackground":         vscode.activity_bar_active_bg
  "activityBar.border":                   vscode.activity_bar_border

  # Status bar
  "statusBar.background":                 vscode.status_bar_bg
  "statusBarItem.remoteBackground":       vscode.remote_bg

  # Input
  "input.background":                     vscode.input_bg

  # Button
  "button.background":                    vscode.button_bg
  "button.foreground":                    vscode.button_fg

  # Breadcrumb
  "breadcrumb.background":                vscode.breadcrumb_bg

  # Lists
  "list.activeSelectionBackground":       ui.bg_tab_active
  "list.activeSelectionForeground":       ui.fg_strong
  "list.focusOutline":                    ui.bg_tab_active
  "list.hoverBackground":                 ui.bg_hover
  "list.inactiveSelectionBackground":     ui.bg_tab_active
  "list.inactiveSelectionForeground":     ui.fg_strong

  # Minimap
  "minimap.background":                   vscode.minimap_bg

  # Peek view
  "peekViewEditor.background":            vscode.peek_editor_bg
  "peekViewResult.background":            vscode.peek_result_bg

  # Terminal
  "terminal.background":                  vscode.terminal_bg

tokenColors:
  - scope:
      - "meta.embedded"
      - "source.groovy.embedded"
      - "string meta.image.inline.markdown"
      - "variable.legacy.builtin.python"
    foreground: syntax.text

  - scope: "emphasis"
    fontStyle: "italic"

  - scope: "strong"
    fontStyle: "bold"

  - scope: "meta.diff.header"
    foreground: syntax.md_bold

  - scope: "comment"
    foreground: syntax.comment

  - scope: "constant.language"
    foreground: syntax.keyword

  - scope:
      - "constant.numeric"
      - "variable.other.enummember"
      - "keyword.operator.plus.exponent"
      - "keyword.operator.minus.exponent"
    foreground: syntax.number

  - scope: "constant.regexp"
    foreground: syntax.regex_char_class

  - scope: "entity.name.tag"
    foreground: syntax.tag_name

  - scope: "entity.name.selector"
    foreground: syntax.tag_name

  - scope: "entity.other.attribute-name"
    foreground: syntax.attribute_name

  - scope:
      - "entity.other.attribute-name.class.css"
      - "source.css entity.other.attribute-name.class"
      - "entity.other.attribute-name.id.css"
      - "entity.other.attribute-name.parent-selector.css"
      - "entity.other.attribute-name.parent.less"
      - "source.css entity.other.attribute-name.pseudo-class"
      - "entity.other.attribute-name.pseudo-element.css"
      - "source.css.less entity.other.attribute-name.id"
      - "entity.other.attribute-name.scss"
    foreground: syntax.css_class

  - scope: "invalid"
    foreground: diagnostic.error

  - scope: "markup.underline"
    fontStyle: "underline"

  - scope: "markup.bold"
    fontStyle: "bold"
    foreground: syntax.md_bold

  - scope: "markup.heading"
    fontStyle: "bold"
    foreground: syntax.md_header

  - scope: "markup.italic"
    fontStyle: "italic"

  - scope: "markup.strikethrough"
    fontStyle: "strikethrough"

  - scope: "markup.inserted"
    foreground: syntax.number

  - scope: "markup.deleted"
    foreground: syntax.string

  - scope: "markup.changed"
    foreground: vcs.modified

  - scope:
      - "punctuation.definition.quote.begin.markdown"
      - "punctuation.definition.list.begin.markdown"
    foreground: syntax.md_list_marker

  - scope: "markup.inline.raw"
    foreground: syntax.md_code

  - scope: "punctuation.definition.tag"
    foreground: syntax.tag_punctuation

  - scope:
      - "meta.preprocessor"
      - "entity.name.function.preprocessor"
    foreground: syntax.keyword

  - scope: "meta.preprocessor.string"
    foreground: syntax.string

  - scope: "meta.preprocessor.numeric"
    foreground: syntax.number

  - scope: "meta.structure.dictionary.key.python"
    foreground: syntax.json_key

  - scope: "storage"
    foreground: syntax.keyword

  - scope: "storage.type"
    foreground: syntax.keyword

  - scope:
      - "storage.modifier"
      - "keyword.operator.noexcept"
    foreground: syntax.keyword

  - scope:
      - "string"
      - "meta.embedded.assembly"
    foreground: syntax.string

  - scope:
      - "string.comment.buffered.block.pug"
      - "string.quoted.pug"
      - "string.interpolated.pug"
      - "string.unquoted.plain.in.yaml"
      - "string.unquoted.plain.out.yaml"
      - "string.unquoted.block.yaml"
      - "string.quoted.single.yaml"
      - "string.quoted.double.xml"
      - "string.quoted.single.xml"
      - "string.unquoted.cdata.xml"
      - "string.quoted.double.html"
      - "string.quoted.single.html"
      - "string.unquoted.html"
      - "string.quoted.single.handlebars"
      - "string.quoted.double.handlebars"
    foreground: syntax.attribute_value

  - scope: "string.regexp"
    foreground: syntax.regex_char_class

  - scope:
      - "punctuation.definition.template-expression.begin"
      - "punctuation.definition.template-expression.end"
      - "punctuation.section.embedded"
    foreground: syntax.string_template

  - scope:
      - "meta.template.expression"
    foreground: syntax.text

  - scope:
      - "support.constant.property-value"
      - "support.constant.font-name"
      - "support.constant.media-type"
      - "support.constant.media"
      - "constant.other.color.rgb-value"
      - "constant.other.rgb-value"
      - "support.constant.color"
    foreground: syntax.css_value

  - scope:
      - "support.type.vendored.property-name"
      - "support.type.property-name"
      - "source.css variable"
      - "source.coffee.embedded"
    foreground: syntax.css_property

  - scope:
      - "support.type.property-name.json"
    foreground: syntax.json_key

  - scope: "keyword"
    foreground: syntax.keyword

  - scope: "keyword.control"
    foreground: syntax.keyword

  - scope: "keyword.operator"
    foreground: syntax.operator

  - scope:
      - "keyword.operator.new"
      - "keyword.operator.expression"
      - "keyword.operator.cast"
      - "keyword.operator.sizeof"
      - "keyword.operator.alignof"
      - "keyword.operator.typeid"
      - "keyword.operator.alignas"
      - "keyword.operator.instanceof"
      - "keyword.operator.logical.python"
      - "keyword.operator.wordlike"
    foreground: syntax.keyword

  - scope: "keyword.other.unit"
    foreground: syntax.number

  - scope:
      - "punctuation.section.embedded.begin.php"
      - "punctuation.section.embedded.end.php"
    foreground: syntax.tag_name

  - scope: "support.function.git-rebase"
    foreground: syntax.json_key

  - scope: "constant.sha.git-rebase"
    foreground: syntax.number

  - scope:
      - "storage.modifier.import.java"
      - "variable.language.wildcard.java"
      - "storage.modifier.package.java"
    foreground: syntax.text

  - scope: "variable.language"
    foreground: syntax.this_keyword

  - scope:
      - "entity.name.function"
      - "support.function"
      - "support.constant.handlebars"
      - "source.powershell variable.other.member"
      - "entity.name.operator.custom-literal"
    foreground: syntax.function_call

  - scope:
      - "support.class"
      - "support.type"
      - "entity.name.type"
      - "entity.name.namespace"
      - "entity.other.attribute"
      - "entity.name.scope-resolution"
      - "entity.name.class"
      - "storage.type.numeric.go"
      - "storage.type.byte.go"
      - "storage.type.boolean.go"
      - "storage.type.string.go"
      - "storage.type.uintptr.go"
      - "storage.type.error.go"
      - "storage.type.rune.go"
      - "storage.type.cs"
      - "storage.type.generic.cs"
      - "storage.type.modifier.cs"
      - "storage.type.variable.cs"
      - "storage.type.annotation.java"
      - "storage.type.generic.java"
      - "storage.type.java"
      - "storage.type.object.array.java"
      - "storage.type.primitive.array.java"
      - "storage.type.primitive.java"
      - "storage.type.token.java"
      - "storage.type.groovy"
      - "storage.type.annotation.groovy"
      - "storage.type.parameters.groovy"
      - "storage.type.generic.groovy"
      - "storage.type.object.array.groovy"
      - "storage.type.primitive.array.groovy"
      - "storage.type.primitive.groovy"
    foreground: syntax.class_name

  - scope:
      - "meta.type.cast.expr"
      - "meta.type.new.expr"
      - "support.constant.math"
      - "support.constant.dom"
      - "support.constant.json"
      - "entity.other.inherited-class"
    foreground: syntax.class_name

  - scope:
      - "keyword.control"
      - "source.cpp keyword.operator.new"
      - "source.cpp keyword.operator.delete"
      - "keyword.other.using"
      - "keyword.other.directive.using"
      - "keyword.other.operator"
      - "entity.name.operator"
    foreground: syntax.keyword

  - scope:
      - "variable"
      - "meta.definition.variable.name"
      - "support.variable"
      - "entity.name.variable"
      - "constant.other.placeholder"
    foreground: syntax.variable

  - scope:
      - "variable.other.constant"
      - "variable.other.enummember"
    foreground: syntax.constant

  - scope:
      - "meta.object-literal.key"
    foreground: syntax.variable

  - scope:
      - "punctuation.definition.group.regexp"
      - "punctuation.definition.group.assertion.regexp"
      - "punctuation.definition.character-class.regexp"
      - "punctuation.character.set.begin.regexp"
      - "punctuation.character.set.end.regexp"
      - "keyword.operator.negation.regexp"
      - "support.other.parenthesis.regexp"
    foreground: syntax.regex_meta

  - scope:
      - "constant.character.character-class.regexp"
      - "constant.other.character-class.set.regexp"
      - "constant.other.character-class.regexp"
      - "constant.character.set.regexp"
    foreground: syntax.regex_char_class

  - scope: "keyword.operator.quantifier.regexp"
    foreground: syntax.regex_quantifier

  - scope:
      - "keyword.operator.or.regexp"
      - "keyword.control.anchor.regexp"
    foreground: syntax.regex_meta

  - scope:
      - "constant.character"
      - "constant.other.option"
    foreground: syntax.keyword

  - scope: "constant.character.escape"
    foreground: syntax.string_escape

  - scope: "entity.name.label"
    foreground: syntax.label

semanticTokenColors:
  newOperator:      syntax.keyword
  stringLiteral:    syntax.string
  customLiteral:    syntax.function_call
  numberLiteral:    syntax.number
