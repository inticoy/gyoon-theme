# ui.yaml — semantic tokens → IntelliJ .theme.json UI keys

"*":
  background:                                   ui.bg
  foreground:                                   ui.fg
  selectionBackground:                          ui.bg_selected
  selectionForeground:                          ui.fg_strong
  disabledBackground:                           ui.bg
  disabledForeground:                           ui.fg_disabled
  inactiveBackground:                           ui.bg
  borderColor:                                  ui.border
  separatorColor:                               ui.separator
  focusColor:                                   ui.focus
  focusedBorderColor:                           ui.focus_border

"Islands":                                      1
"MainWindow.background":                        ui.bg
"Panel.background":                             ui.bg_panel
"MainToolbar.background":                       ui.bg
"MainToolbar.borderColor":                      "#00000000"
"TitlePane.background":                         ui.bg
"Editor.background":                            ui.bg_editor
"Island.borderColor":                           ui.bg_panel

EditorTabs:
  background:                                   ui.bg_editor
  underlinedTabBackground:                      ui.bg_tab_active
  inactiveUnderlinedTabBackground:              ui.bg_selected_inactive
  underlinedBorderColor:                        accent.primary
  inactiveUnderlinedTabBorderColor:             accent.primary
  underlineColor:                               accent.primary
  underlineHeight:                              __base.editor_tabs.underlineHeight
  hoverBackground:                              ui.bg_hover
  inactiveColoredFileBackground:                ui.bg

ToolWindow:
  Header:
    background:                                 ui.bg_panel
    inactiveBackground:                         ui.bg_panel
  HeaderTab:
    selectedBackground:                         ui.bg_selected_inactive
    hoverBackground:                            ui.bg_hover
    underlineColor:                             accent.primary
  background:                                   ui.bg_panel
  "Stripe.borderColor":                         "#00000000"
  "Button.selectedBackground":                  ui.bg_selected_inactive
  "Button.hoverBackground":                     ui.bg_hover

StatusBar:
  background:                                   status.bar_bg
  borderColor:                                  "#00000000"
  hoverBackground:                              status.bar_hover

NavBar:
  borderColor:                                  ui.border

List:
  background:                                   ui.bg
  selectionBackground:                          ui.bg_selected
  selectionForeground:                          ui.fg_strong
  selectionInactiveBackground:                  ui.bg_selected_inactive
  hoverBackground:                              ui.bg_hover
  hoverInactiveBackground:                      ui.bg_hover

Tree:
  background:                                   ui.bg
  selectionBackground:                          ui.bg_selected
  selectionForeground:                          ui.fg_strong
  selectionInactiveBackground:                  ui.bg_selected_inactive
  hoverBackground:                              ui.bg_hover
  rowHeight:                                    __base.tree.rowHeight

Table:
  background:                                   ui.bg
  stripeColor:                                  ui.bg_hover
  selectionBackground:                          ui.bg_selected
  selectionForeground:                          ui.fg_strong
  hoverBackground:                              ui.bg_hover
  gridColor:                                    ui.border

ScrollBar:
  Mac:
    thumbColor:                                 ui.scrollbar_thumb
    thumbBorderColor:                           ui.scrollbar_thumb
    hoverThumbColor:                            ui.scrollbar_thumb_hover
    hoverThumbBorderColor:                      ui.scrollbar_thumb_hover
  thumbColor:                                   ui.scrollbar_thumb
  thumbBorderColor:                             ui.scrollbar_thumb
  hoverThumbColor:                              ui.scrollbar_thumb_hover
  hoverThumbBorderColor:                        ui.scrollbar_thumb_hover
  trackColor:                                   ui.bg_scrollbar_track
  background:                                   ui.bg_scrollbar_track

Button:
  default:
    startBackground:                            button.default_bg
    endBackground:                              button.default_bg
    foreground:                                 button.default_fg
    focusedBorderColor:                         ui.focus_border
    startBorderColor:                           button.default_border
    endBorderColor:                             button.default_border
  startBackground:                              button.bg
  endBackground:                                button.bg
  foreground:                                   button.fg
  startBorderColor:                             button.border
  endBorderColor:                               button.border

ComboBox:
  background:                                   ui.bg_combobox
  nonEditableBackground:                        ui.bg_combobox
  "ArrowButton.background":                     ui.bg_combobox
  selectionBackground:                          ui.bg_selected

TextField:
  background:                                   ui.bg_input
  selectionBackground:                          ui.bg_selected
  selectionForeground:                          ui.fg_strong

TextArea:
  background:                                   ui.bg_input

SearchEverywhere:
  "Header.background":                          ui.bg_popup
  "SearchField.background":                     ui.bg_input
  "Tab.selectedBackground":                     ui.bg_selected
  "Tab.selectedForeground":                     ui.fg_strong

Popup:
  background:                                   ui.bg_popup
  "Header.activeBackground":                    ui.bg_popup_header
  "Header.inactiveBackground":                  ui.bg_popup_header
  borderColor:                                  ui.border
  separatorColor:                               ui.separator

CompletionPopup:
  background:                                   ui.bg_completion
  selectionBackground:                          ui.bg_selected
  matchForeground:                              ui.completion_match
  foreground:                                   ui.fg_completion

ProgressBar:
  progressColor:                                progress.color
  indeterminateStartColor:                      progress.color
  indeterminateEndColor:                        progress.indeterminate_end
  trackColor:                                   progress.track

Notification:
  background:                                   ui.bg_notification
  borderColor:                                  ui.border
  errorBackground:                              diagnostic.error_bg
  errorBorderColor:                             diagnostic.error_border
  errorForeground:                              ui.fg

NotificationToolWindow:
  "newNotification.background":                 ui.bg_notification
  informativeForeground:                        notification.info_fg
  warningForeground:                            notification.warning_fg
  errorForeground:                              notification.error_fg

SearchMatch:
  startBackground:                              diagnostic.search_match_bg
  endBackground:                                diagnostic.search_match_bg

Debugger:
  "ChangeValue.background":                     ui.bg_popup_header

ActionButton:
  hoverBackground:                              ui.bg_selected_inactive
  pressedBackground:                            ui.bg_selected
  hoverBorderColor:                             "#00000000"

